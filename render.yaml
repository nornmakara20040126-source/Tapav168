services:
  - type: web
    name: tapav-telegram-proxy
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm ci --omit=dev
    startCommand: node server/telegram-proxy.mjs
    healthCheckPath: /health
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
