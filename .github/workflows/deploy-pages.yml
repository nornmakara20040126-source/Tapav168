name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_TELEGRAM_PROXY_URL: ${{ vars.VITE_TELEGRAM_PROXY_URL }}
          VITE_TELEGRAM_ROLE_CHAT_IDS: ${{ vars.VITE_TELEGRAM_ROLE_CHAT_IDS }}
        shell: bash
        run: |
          export VITE_BASE_PATH="/${GITHUB_REPOSITORY#*/}/"
          export VITE_TELEGRAM_PROXY_URL="${VITE_TELEGRAM_PROXY_URL:-https://tapav-telegram-proxy.onrender.com/telegram/send}"
          npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
